<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">ฟ้าข้างใน</title>
  <desc id="desc">เว็บฮีลใจภาษาไทยจากรูปท้องฟ้า ก้อนเมฆ และวิวธรรมชาติ</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#cfe5f2"/>
      <stop offset="0.52" stop-color="#fffaf2"/>
      <stop offset="1" stop-color="#dfe9ef"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#sky)"/>
  <g opacity="0.76" filter="url(#softBlur)" fill="#ffffff">
    <ellipse cx="260" cy="128" rx="118" ry="38"/>
    <ellipse cx="376" cy="128" rx="166" ry="50"/>
    <ellipse cx="792" cy="166" rx="185" ry="58"/>
    <ellipse cx="928" cy="158" rx="112" ry="36"/>
  </g>
  <path d="M0 455 C176 386 302 496 486 422 C674 346 824 438 1200 334 L1200 630 L0 630 Z" fill="#55788f" opacity="0.22"/>
  <path d="M0 520 C222 424 382 540 596 477 C780 423 974 501 1200 428 L1200 630 L0 630 Z" fill="#26313a" opacity="0.22"/>
  <rect x="86" y="82" width="1028" height="466" rx="34" fill="rgba(255,255,255,0.62)"/>
  <text x="600" y="214" text-anchor="middle" font-family="'Noto Sans Thai', 'LINE Seed Sans TH', Arial, sans-serif" font-size="32" font-weight="800" fill="#55788f">ฟ้าข้างใน</text>
  <text x="600" y="306" text-anchor="middle" font-family="'Noto Sans Thai', 'LINE Seed Sans TH', Arial, sans-serif" font-size="58" font-weight="800" fill="#26313a">วันนี้ท้องฟ้าที่คุณถ่าย</text>
  <text x="600" y="382" text-anchor="middle" font-family="'Noto Sans Thai', 'LINE Seed Sans TH', Arial, sans-serif" font-size="50" font-weight="800" fill="#55788f">อาจกำลังบอกอะไรบางอย่างกับใจคุณ</text>
  <text x="600" y="468" text-anchor="middle" font-family="'Noto Sans Thai', 'LINE Seed Sans TH', Arial, sans-serif" font-size="27" font-weight="600" fill="#50616c">อัปโหลดรูปท้องฟ้า แล้วรับคำปลอบใจเบา ๆ จาก AI</text>
</svg>
